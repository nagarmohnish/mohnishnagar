<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,300;1,6..72,400;1,6..72,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Archivo+Black&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; background: #FFF1E5; }
    body { font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; }
    #scale-wrap { width: 1440px; transform-origin: top left; }
    .preview-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 9999; display: flex; justify-content: space-between; align-items: center; padding: 9px 16px; background: rgba(20,20,20,0.78); color: #fff; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
    .preview-bar a { color: rgba(255,255,255,0.7); text-decoration: none; }
    .preview-bar a:hover { color: #fff; }
    .preview-bar .pb-mid { color: rgba(255,255,255,0.55); }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
</head>
<body>
  <div class="preview-bar">
    <a href="../">&larr; All directions</a>
    <span class="pb-mid">09 · Financial Times</span>
    <a href="../../">Main site &rarr;</a>
  </div>
  <div id="scale-wrap"><div id="root"></div></div>
  <script src="../data.js"></script>
  <script type="text/babel" src="../design-ft.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    ReactDOM.createRoot(document.getElementById('root')).render(<FTDesign />);
  </script>
  <script>
    (function () {
      const wrap = document.getElementById('scale-wrap');
      const root = document.getElementById('root');
      function fit() {
        const scale = Math.min(1, window.innerWidth / 1440);
        wrap.style.transform = 'scale(' + scale + ')';
        const inner = root.firstElementChild;
        if (inner) document.body.style.height = (inner.offsetHeight * scale + 36) + 'px';
      }
      window.addEventListener('resize', fit);
      new ResizeObserver(fit).observe(root);
      fit();
    })();
  </script>
</body>
